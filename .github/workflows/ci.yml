name: CI
on: [pull_request, push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Check for duplicate dependencies
        run: |
          npm dedupe
          git diff --exit-code package-lock.json || {
            echo "::error file=package-lock.json::Lockfile changes detected after deduplication. Run `npm dedupe` and commit the result.";
            exit 1;
          }
      - run: npm test
